name: Actualizar precios

on:
  schedule:
    # 9:00 AM Argentina time (UTC-3) = 12:00 UTC
    - cron: '0 12 * * 1-5'
    # 6:00 PM Argentina time (UTC-3) = 21:00 UTC
    - cron: '0 21 * * 1-5'
  # Allow manual trigger from GitHub website
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch prices from Yahoo Finance + save to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python update_prices.py

      - name: Commit and push prices.json
        run: |
          git config user.name "Portfolio Bot"
          git config user.email "bot@portfolio"
          git add prices.json
          git diff --staged --quiet || git commit -m "Actualizar precios $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
