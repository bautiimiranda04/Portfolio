name: Actualizar precios

on:
  schedule:
    # 9:00 AM Argentina time (UTC-3) = 12:00 UTC — todos los días
    - cron: '0 12 * * *'
    # 6:00 PM Argentina time (UTC-3) = 21:00 UTC — todos los días
    - cron: '0 21 * * *'
  # Allow manual trigger from GitHub website
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch prices + save to Supabase + check alerts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAILS: ${{ secrets.ALERT_EMAILS }}
        run: python update_prices.py
